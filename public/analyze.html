<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;background:#000">
<img id="ref" src="/ref.png" style="display:none">
<pre id="out" style="color:#0f0;background:#111;padding:20px;font:12px/1.4 monospace;white-space:pre-wrap;margin:0;min-height:100vh"></pre>
<script>
const img = document.getElementById('ref');
img.onload = function() {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0,0,c.width,c.height).data;
  let r = '=== IMAGE: ' + c.width + 'x' + c.height + ' ===\n';
  
  // Vertical scan at center
  r += '\n--- Vertical center column (x=' + Math.floor(c.width/2) + ') ---\n';
  let last = '';
  for (let y = 0; y < c.height; y+=2) {
    const i = (y*c.width + Math.floor(c.width/2))*4;
    const rgb = d[i]+','+d[i+1]+','+d[i+2];
    if (rgb !== last) {
      const avg = Math.round((d[i]+d[i+1]+d[i+2])/3);
      let tag = avg > 230 ? '███' : avg > 160 ? '▓▓▓' : avg > 80 ? '▒▒▒' : d[i]>200&&d[i+1]<80?'░░░R': d[i+1]>200&&d[i]<80?'░░░G': d[i+2]>200&&d[i]<80?'░░░B': avg<20?'   ':'···';
      r += 'y=' + String(y).padStart(3) + ' RGB(' + rgb + ') ' + tag + '\n';
      last = rgb;
    }
  }
  
  // Text regions
  r += '\n--- Text regions by height ---\n';
  [38,40,42,44,46,48,50,52,54,56,58,60,62,64,66,68,70,80,85,90,95,100,105,110,115,120,125,130,135,140,145,150,155,160,165,170,175,180,190,200,210,220,230,240,250].forEach(y => {
    if(y>=c.height)return;
    let min=c.width, max=0, cnt=0, colors={};
    for(let x=0;x<c.width;x+=2){
      const i=(y*c.width+x)*4;
      const b=(d[i]+d[i+1]+d[i+2])/3;
      if(b>40){
        cnt++;
        if(x<min)min=x;
        if(x>max)max=x;
        const key='('+d[i]+','+d[i+1]+','+d[i+2]+')';
        colors[key]=(colors[key]||0)+1;
      }
    }
    if(cnt>3){
      const topColor=Object.entries(colors).sort((a,b)=>b[1]-a[1])[0][0];
      r += 'y='+String(y).padStart(3)+' x='+String(min).padStart(3)+'-'+String(max).padStart(3)+' ('+cnt+'px) color='+topColor+'\n';
    }
  });

  document.getElementById('out').textContent = r;
};
</script>
</body>
</html>
